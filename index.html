<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TO DO list</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="/script.js" defer></script>
  </head>
  <body>
    <section class="todo">
      <h2>TO DO list</h2>
      <div class="input">
        <input
          type="text"
          class="input-field"
          id="todoInput"
          placeholder="Add a new todo"
        />
        <button class="btn">Add</button>
      </div>
<ul class="scroll">
    <li id="todoList"></li>
</ul>
<div>
        <hr class="counter"/>
        <div class="counter-container"</div>
            <p><span id="todoCount">0 </span>items in total</p>
            <button id="deleteButton">Delete tasks</button>
      </div>
      </div
      </section>
      <footer>
   </footer>
  </body>
</html>
